<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briffe · Préparation prestation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#0f0f0f;color:#e8e8e0;min-height:100vh}
button,input,select{font-family:'DM Mono',monospace}
.header{border-bottom:1px solid #1e1e1e;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;background:#111;position:sticky;top:0;z-index:10}
.logo{font-size:12px;letter-spacing:.15em;color:#444;text-transform:uppercase}
.logo span{color:#e8e8e0}
.header-right{display:flex;gap:8px;align-items:center}
#tab-bar{display:flex;border-bottom:1px solid #1e1e1e;background:#111;padding:0 28px}
.tab-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:11px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:#444;cursor:pointer}
.tab-btn.active{color:#e8e8e0;border-bottom-color:#e8e8e0}
.tab-btn:hover{color:#888}
.wrap{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 96px)}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
.panel{border-right:1px solid #1e1e1e;padding:22px 24px;background:#101010}
.sheet{padding:22px 28px;max-width:860px}
.section-label{font-size:10px;color:#666;letter-spacing:.14em;text-transform:uppercase;margin:20px 0 10px;padding-bottom:4px;border-bottom:1px solid #1a1a1a}
.section-label:first-child{margin-top:0}
.field{margin-bottom:12px}
.f-label{font-size:10px;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;display:block}
input[type=text],input[type=number],input[type=date],input[type=time],select{
  width:100%;background:#0f0f0f;color:#e8e8e0;border:1px solid #2a2a2a;border-radius:3px;padding:8px 10px;font-size:12px}
input:focus,select:focus{outline:none;border-color:#555}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #161616}
.toggle-row span{font-size:12px;color:#b0b0a8}
.seg{display:inline-flex;border:1px solid #2a2a2a;border-radius:3px;overflow:hidden}
.seg button{font-size:10px;letter-spacing:.06em;padding:4px 11px;background:transparent;border:none;color:#555;cursor:pointer}
.seg button.on{background:#e8e8e0;color:#0f0f0f}
.chk{display:flex;gap:6px;flex-wrap:wrap}
.chk button{font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px;background:transparent;border:1px solid #2a2a2a;border-radius:3px;color:#555;cursor:pointer}
.chk button.on{border-color:#e8e8e0;color:#e8e8e0}
.mini{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.mini .m-num{width:74px;flex:none}
.sec{border-bottom:1px solid #161616}
.sec-head{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;cursor:pointer;font-size:10px;color:#8a8a82;letter-spacing:.14em;text-transform:uppercase;padding:12px 0 11px;font-family:inherit}
.sec-head:hover{color:#e8e8e0}
.sec-head .caret{color:#555;font-size:14px;line-height:1}
.sec-body{padding-bottom:14px}
.btn{font-size:11px;letter-spacing:.1em;padding:8px 16px;border-radius:3px;text-transform:uppercase;border:1px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:#444;color:#aaa}
.btn.primary{border-color:#e8e8e0;background:#e8e8e0;color:#0f0f0f}
.btn.primary:hover{opacity:.85}
#import-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding:12px 28px;background:#141210;border-bottom:1px solid #1e1e1e}
.ib-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ib-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#f59e0b}
#import-bar input{background:#0f0f0f;color:#e8e8e0;border:1px solid #2a2a2a;border-radius:3px;padding:8px 12px;font-size:12px;width:170px}
#import-bar input:focus{outline:none;border-color:#f59e0b}
.ib-status{font-size:11px;color:#666}
.ib-status b{color:#22c55e;font-weight:400}
.ib-hint{font-size:10px;color:#3a3a3a}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid #1e1e1e;padding-bottom:16px;margin-bottom:8px}
.sheet-title{font-size:16px;color:#e8e8e0}
.sheet-meta{font-size:11px;color:#555;margin-top:6px;line-height:1.8}
.sheet-meta b{color:#8a8a82;font-weight:400}
.grp{margin-top:20px}
.grp-title{font-size:10px;color:#f59e0b;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #1a1a1a}
table{width:100%;border-collapse:collapse}
td,th{text-align:left;padding:5px 8px;font-size:12px;border-bottom:1px solid #141414;vertical-align:top}
th{font-size:9px;color:#3a3a3a;letter-spacing:.1em;text-transform:uppercase;font-weight:400}
.qty{color:#e8e8e0;text-align:right;white-space:nowrap;width:60px}
.qty.zero{color:#2f2f2f}
.qty.chk{color:#22c55e}
.el{color:#b0b0a8}
.cat{color:#4a4a4a;font-size:10px;text-transform:uppercase;letter-spacing:.05em;width:74px}
.store,.loc{color:#666;font-size:11px}
.cmt{color:#3a3a3a;font-size:10px;font-style:italic}
.cellsel{width:auto;max-width:130px;background:#0f0f0f;color:#b7b7ae;border:1px solid #242424;border-radius:3px;padding:2px 4px;font-size:11px}
.cellother{display:block;margin-top:3px;width:120px;background:#0f0f0f;color:#e8e8e0;border:1px solid #242424;border-radius:3px;padding:2px 4px;font-size:11px}
.cellcmt{width:100%;min-width:120px;background:transparent;color:#8a8a82;border:1px solid transparent;border-radius:3px;padding:2px 4px;font-size:10px;font-style:italic}
.cellcmt:hover{border-color:#242424}.cellcmt:focus{border-color:#3a3a3a;background:#0f0f0f;color:#e8e8e0}
.bulksel{width:auto;margin-left:6px;background:#141210;color:#f59e0b;border:1px solid #2a2620;border-radius:3px;padding:1px 3px;font-size:9px;text-transform:none;letter-spacing:0}
.empty{color:#333;font-size:12px;padding:40px 0;text-align:center}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid #22c55e33;background:#22c55e0e;color:#22c55e}
@media print{
  body{background:#fff;color:#000}
  .header,#import-bar,#tab-bar,.panel,.no-print{display:none!important}
  .wrap{grid-template-columns:1fr}
  .sheet{max-width:100%;padding:0}
  .grp-title{color:#000;border-color:#999}
  td,th{border-color:#ddd}
  .qty,.el{color:#000}.qty.chk{color:#000}.cat,.store,.loc,.cmt{color:#444}
  .sheet-title,.sheet-meta b{color:#000}
  .cellsel,.cellother,.cellcmt{border:none;background:transparent;color:#000;padding:0;-webkit-appearance:none;appearance:none}
  .cellcmt::placeholder{color:transparent;opacity:0}
  .bulksel{display:none!important}
}

function slug(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}

// Ligne : opts = { store:[...], loc:[...] } rend la cellule éditable (menu déroulant)
function line(cat,el,qty,store,loc,cmt,opts){return {cat,el,qty,store:store||"",loc:loc||"",cmt:cmt||"",opts:opts||null};}
// Ligne vaisselle : Fournisseur (Briffe/Exel/Autre) + Livraison (Labo/Direct client)
function vline(el,qty,cmt,defStore,defLoc){
  return line("Vaisselle",el,qty,defStore||"Briffe",defLoc||"Labo",cmt,
    {store:["Briffe","Exel","Autre"], loc:["Labo","Direct client"]});
}

function alcoolQty(){
  const nb=N(S.nb);
  return {
    rouge: S.alcool ? RUd(nb*S.verresPer*S.pRouge,5) : 0,
    blanc: S.alcool ? RUd(nb*S.verresPer*S.pBlanc,5) : 0,
    biere: S.alcool ? RUd(nb*S.verresPer*S.pBiere,4) : 0,
    rose: S.alcool?N(S.rose):0, futs:S.alcool?N(S.futs):0,
    cremant:S.alcool?N(S.cremant):0, champagne:S.alcool?N(S.champagne):0,
    autre:S.alcool?N(S.alcoolAutre):0
  };
}
function softVals(){
  const nb=N(S.nb);
  return {jus:S.softs?RUd(nb*15/4,100):0, eau:S.softs?RUd(nb*0.2,1):0, autre:S.softs?N(S.softAutre):0};
}
function chafingOf(){
  if(S.type==='chaud'){ const gn7=CEIL(S.gn12,2); return RU(N(S.gn11)+gn7/2); }
  if(S.type==='cocktail') return N(S.chafingManual);
  return 0;
}
function techNums(){
  const chaf=chafingOf();
  return {
    multi: S.tMulti!=null?N(S.tMulti):RUd(chaf,2),
    rall:  S.tRall!=null?N(S.tRall):RUd(chaf,2),
    touret:S.tTouret!=null?N(S.tTouret):0
  };
}
function techniqueGroup(){
  if(!S.technique) return null;
  const t=techNums();
  return {title:"Technique", rows:[
    line("Logistique","Multiprise",t.multi,"Quai","Briffe"),
    line("Logistique","Rallonge",t.rall,"Quai","Briffe"),
    line("Logistique","Touret 25m",t.touret,"Quai","Briffe","Si contrainte technique")
  ]};
}
function mobilierGroup(){
  const tbl=N(S.tblNb), md=N(S.mdNb);
  const nappes=S.nappesOn?(S.nappesNb!=null?N(S.nappesNb):RUd(N(S.nb),40)):0;
  const rows=[
    line("Mobilier","Tables",tbl,"Quai","Briffe"),
    line("Mobilier","Housses de table",S.tblHousse?tbl:0,"Quai","Briffe"),
    line("Mobilier","Mange-debout",md,"Quai","Briffe"),
    line("Mobilier","Housses mange-debout",S.mdHousse?md:0,"Quai","Briffe"),
    line("Mobilier","Nappes",nappes,"Quai","Briffe")
  ];
  return {title:"Mobilier", rows};
}
function optionsGroup(){
  return {title:"Options", rows:[ line("Logistique","Étuve + échelle",S.etuve?1:0,"Quai","Briffe") ]};
}
function serviceBlock(alc){
  const nb=N(S.nb);
  const mh=S.mhOn?1:0;
  const serveur=N(S.serveurNb);
  return [
    line("service","Maître d'hôtel",mh),
    line("service","Vacation maître d'hôtel",mh?N(S.mhDuree):0,"Quai"),
    line("service","Serveur",serveur,"Quai","Briffe"),
    line("service","Vacation par serveur",serveur>0?N(S.serveurDuree):0,"Quai"),
    line("service","Tenues de service",mh+serveur,"Quai","Briffe","T-shirt + casquette"),
    line("service","Tablier service",mh+serveur),
    line("service","Plateau de service",serveur>0?serveur:0,"Quai","Briffe"),
    line("Logistique","Limonadier",(alc.rouge+alc.blanc+alc.biere+alc.futs)>0?RUd(nb,50):0,"Quai","Briffe")
  ];
}
function softsGroup(){
  const s=softVals(); const L={loc:["Briffe","Direct client"]};
  return {title:"Softs", colLoc:"Livraison", rows:[
    line("Boisson","Jus de pommes",s.jus,"Chambre froide","Briffe","",L),
    line("Boisson","Jus d'orange",s.jus,"Chambre froide","Briffe","",L),
    line("Boisson","Cola",s.jus,"Chambre froide","Briffe","",L),
    line("Boisson","Limonade",s.jus,"Chambre froide","Briffe","",L),
    line("Boisson","Eau plate",s.eau,"Quai","Briffe","",L),
    line("Boisson","Eau bouteille",s.eau,"Quai","Briffe","",L),
    line("Boisson","Soft autre",s.autre,"","Briffe","préciser",L)
  ]};
}
function alcoolGroup(a){
  const L={loc:["Briffe","Direct client"]};
  return {title:"Alcool", colLoc:"Livraison", rows:[
    line("Boisson","Vin rouge",a.rouge,"Economat","Briffe","",L),
    line("Boisson","Vin blanc",a.blanc,"Chambre froide","Briffe","",L),
    line("Boisson","Bière bouteilles",a.biere,"Chambre froide","Briffe","",L),
    line("Boisson","Vin rosé",a.rose,"Chambre froide","Briffe","",L),
    line("Boisson","Bière fûts",a.futs,"Quai","Briffe","",L),
    line("Boisson","Crémant",a.cremant,"Chambre froide","Briffe","",L),
    line("Boisson","Champagne",a.champagne,"Chambre froide","Briffe","",L),
    line("Boisson","Alcool autre",a.autre,"Labo","Briffe","préciser",L)
  ]};
}

  ]});
  grp.push({title:"Prestation", rows:[

  grp.push(softsGroup());
  grp.push(alcoolGroup(a));
  grp.push({title:"Service", rows:serviceBlock(a)});
  return grp;

//  RENDU FORMULAIRE
// ══════════════════════════════════════════════════════════════════════════
function seg(field){
  const on=S[field]===true;
  return '<span class="seg">'
    +'<button class="'+(!on?'on':'')+'" onclick="setF(\''+field+'\',false)">NON</button>'
    +'<button class="'+(on?'on':'')+'" onclick="setF(\''+field+'\',true)">OUI</button></span>';
}
function toggleRow(label,field){ return '<div class="toggle-row"><span>'+label+'</span>'+seg(field)+'</div>'; }
function chk(field,label){ return '<button class="'+(S[field]?'on':'')+'" onclick="setF(\''+field+'\','+(!S[field])+')">'+label+'</button>'; }
function num(field,val){ return '<input type="number" min="0" value="'+val+'" oninput="S.'+field+'=+this.value;renderSheet()">'; }
// champ numérique "auto" : vide = valeur calculée (placeholder)
function numAuto(field,auto){
  const v=S[field]!=null?S[field]:'';
  return '<input type="number" min="0" class="m-num" placeholder="'+auto+'" value="'+v+'" oninput="S.'+field+'=this.value===\'\'?null:+this.value;renderSheet()">';
}

    bo+='<div class="f-label" style="margin-top:10px">Extras (bouteilles) : rosé / fûts / crémant / champagne</div><div class="row4">'
      +'<input type="number" min="0" title="rosé" value="'+S.rose+'" oninput="S.rose=+this.value;renderSheet()">'
      +'<input type="number" min="0" title="fûts" value="'+S.futs+'" oninput="S.futs=+this.value;renderSheet()">'
      +'<input type="number" min="0" title="crémant" value="'+S.cremant+'" oninput="S.cremant=+this.value;renderSheet()">'
      +'<input type="number" min="0" title="champagne" value="'+S.champagne+'" oninput="S.champagne=+this.value;renderSheet()"></div></div>';
  }
  add('boissons','Boissons',bo);

  // Service
  let sv=toggleRow("Maître d'hôtel",'mhOn');
  if(S.mhOn) sv+='<div class="mini"><span class="f-label" style="margin:0">Durée MH (vacations)</span><input type="number" min="0" step="0.5" class="m-num" value="'+S.mhDuree+'" oninput="S.mhDuree=+this.value;renderSheet()"></div>';
  sv+='<div class="mini"><span class="f-label" style="margin:0">Serveurs (nombre)</span><input type="number" min="0" class="m-num" value="'+S.serveurNb+'" oninput="S.serveurNb=+this.value;renderSheet()"></div>';
  sv+='<div class="mini"><span class="f-label" style="margin:0">Durée serveur (vacations)</span><input type="number" min="0" step="0.5" class="m-num" value="'+S.serveurDuree+'" oninput="S.serveurDuree=+this.value;renderSheet()"></div>';
  add('service','Service',sv);

  // Mobilier
  let mo='<div class="mini"><span class="f-label" style="margin:0">Tables (nombre)</span><input type="number" min="0" class="m-num" value="'+S.tblNb+'" oninput="S.tblNb=+this.value;renderSheet()"></div>'
    +toggleRow('Tables avec housse','tblHousse')
    +'<div class="mini"><span class="f-label" style="margin:0">Mange-debout (nombre)</span><input type="number" min="0" class="m-num" value="'+S.mdNb+'" oninput="S.mdNb=+this.value;renderSheet()"></div>'
    +toggleRow('Mange-debout avec housse','mdHousse')
    +toggleRow('Nappes','nappesOn');
  if(S.nappesOn) mo+='<div class="mini"><span class="f-label" style="margin:0">Nappes (nombre)</span>'+numAuto('nappesNb',RUd(N(S.nb),40))+'</div>';
  add('mobilier','Mobilier',mo);

  // Technique
  let te=toggleRow('Technique','technique');
  if(S.technique){
    const chaf=chafingOf();
    te+='<div class="row3" style="margin-top:8px">'
      +'<div class="field"><label class="f-label">Multiprise</label>'+numAuto('tMulti',RUd(chaf,2))+'</div>'
      +'<div class="field"><label class="f-label">Rallonge</label>'+numAuto('tRall',RUd(chaf,2))+'</div>'
      +'<div class="field"><label class="f-label">Touret 25m</label>'+numAuto('tTouret',0)+'</div></div>';
  }
  add('technique','Technique',te);

  // Options
  add('options','Options',toggleRow('Étuve + échelle','etuve'));

  let h='';
  secs.forEach(s=>{
    const open=!S.collapsed[s.id];
    h+='<div class="sec"><button type="button" class="sec-head" onclick="toggleSec(\''+s.id+'\')"><span>'+esc(s.title)+'</span><span class="caret">'+(open?'−':'+')+'</span></button>'
      +'<div class="sec-body"'+(open?'':' style="display:none"')+'>'+s.body+'</div></div>';
  });
  document.getElementById('panel').innerHTML=h;
}
function toggleSec(id){ S.collapsed[id]=!S.collapsed[id]; renderPanel(); }

// ══════════════════════════════════════════════════════════════════════════
//  RENDU FEUILLE
// ══════════════════════════════════════════════════════════════════════════
function fmtQty(q){
  if(q==='x') return '<td class="qty chk">✓</td>';
  const z=(!q||q===0);
  return '<td class="qty'+(z?' zero':'')+'">'+(z?'0':q)+'</td>';
}
function cell(g,r,which){
  const opts=r.opts && r.opts[which];
  const cls=(which==='store')?'store':'loc';
  const cur=(which==='store')?r.store:r.loc;
  if(!opts) return '<td class="'+cls+'">'+esc(cur)+'</td>';
  const key=(which==='store'?'s_':'l_')+slug(g.title)+'_'+slug(r.el);
  const val=(S.choice[key]!=null?S.choice[key]:cur);
  const o=opts.map(op=>'<option'+(op===val?' selected':'')+'>'+esc(op)+'</option>').join('');
  let html='<td class="'+cls+'"><select class="cellsel" onchange="setChoice(\''+key+'\',this.value)">'+o+'</select>';
  if(val==='Autre') html+='<input class="cellother" placeholder="préciser" value="'+esc(S.choiceOther[key]||'')+'" oninput="setOther(\''+key+'\',this.value)">';
  return html+'</td>';
}
function cmtCell(g,r){
  const key='c_'+slug(g.title)+'_'+slug(r.el);
  const val=(S.comment[key]!=null?S.comment[key]:(r.cmt||''));
  return '<td class="cmt"><input class="cellcmt" placeholder="commentaire" value="'+esc(val)+'" oninput="setComment(\''+key+'\',this.value)"></td>';
}
// Sélecteur "toute la colonne" dans l'entête
function bulkSel(title,which,opts){
  const o=['<option value="">tout ↓</option>'].concat(opts.map(op=>'<option>'+esc(op)+'</option>')).join('');
  return '<select class="bulksel" title="appliquer à toute la colonne" onchange="setColumn(\''+esc(title)+'\',\''+which+'\',this.value)">'+o+'</select>';
}
function renderSheet(){
  const groups=MODELS[S.type]();
  let h='<div class="sheet-head"><div>'
    +'<div class="sheet-title">'+TITLES[S.type]+'</div>'
    +'<div class="sheet-meta">'
    +(S.client?'<b>Client</b> '+esc(S.client)+' · ':'')
    +'<b>Convives</b> '+(S.nb||0)
    +(S.date?' · <b>Date</b> '+esc(S.date):'')
    +(S.heure?' · <b>Heure</b> '+esc(S.heure):'')
    +(S.sextan?' · <b>Réception</b> '+esc(S.sextan):'')
    +'</div></div>';
  const tags=[];
  if(S.mhOn||N(S.serveurNb)>0) tags.push('service');
  if(S.alcool) tags.push('alcool');
  if(S.softs) tags.push('softs');
  if(S.nappesOn) tags.push('nappes');
  h+='<div class="no-print" style="text-align:right">'+(tags.length?'<span class="pill">'+tags.join(' · ')+'</span>':'')+'</div></div>';

  if(!S.nb){ h+='<div class="empty">Renseigne le nombre de convives pour générer la feuille.</div>'; document.getElementById('sheet').innerHTML=h; return; }

  groups.forEach(g=>{
    const rows=g.rows.filter(r=>!(r.qty===0 && r.el!==''));
    if(!rows.length) return;
    const showLoc=!g.noLoc;
    const soRow=rows.find(r=>r.opts&&r.opts.store); const so=soRow&&soRow.opts.store;
    const loRow=rows.find(r=>r.opts&&r.opts.loc);   const lo=loRow&&loRow.opts.loc;
    h+='<div class="grp"><div class="grp-title">'+esc(g.title)+'</div><table>';
    h+='<tr><th>Catégorie</th><th>Élément</th><th style="text-align:right">Qté</th>';
    h+='<th>'+(g.colStore||'Stockage')+(so?bulkSel(g.title,'store',so):'')+'</th>';
    if(showLoc) h+='<th>'+(g.colLoc||'Location')+(lo?bulkSel(g.title,'loc',lo):'')+'</th>';
    h+='<th>Commentaire</th></tr>';
    rows.forEach(r=>{
      // Softs/Alcool : livraison "Direct client" → stockage vidé
      if(r.opts && r.opts.loc && !r.opts.store){
        const lk='l_'+slug(g.title)+'_'+slug(r.el);
        const lv=(S.choice[lk]!=null?S.choice[lk]:r.loc);
        if(lv==='Direct client') r.store='';
      }
      h+='<tr><td class="cat">'+esc(r.cat)+'</td><td class="el">'+esc(r.el)+'</td>'+fmtQty(r.qty)
        +cell(g,r,'store')+(showLoc?cell(g,r,'loc'):'')+cmtCell(g,r)+'</tr>';
    });
    h+='</table></div>';
  });
  document.getElementById('sheet').innerHTML=h;
}

// ══════════════════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════════════════
function setType(t){
  S.type=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===t));
  render();
}
function setF(field,val){ S[field]=val; render(); }
function setChoice(k,v){ S.choice[k]=v; renderSheet(); }
function setOther(k,v){ S.choiceOther[k]=v; }
function setComment(k,v){ S.comment[k]=v; }
function setColumn(title,which,val){
  if(!val) return;
  const g=MODELS[S.type]().find(x=>x.title===title);
  if(!g) return;
  g.rows.forEach(r=>{
    if(r.opts && r.opts[which]){
      S.choice[(which==='store'?'s_':'l_')+slug(g.title)+'_'+slug(r.el)]=val;
    }
  });
  renderSheet();
}
function render(){ renderPanel(); renderSheet(); }
function resetForm(){
  const keep=S.type;
  Object.assign(S,{client:"",date:"",heure:"",nb:0,sextan:"",entree:false,plat:false,dessert:false,
    gn11:0,gn12:0,nbPlats:0,chafingManual:0,cocktailAssiettes:0,softs:false,alcool:false,etuve:false,
    technique:true,tMulti:null,tRall:null,tTouret:null,
    mhOn:false,mhDuree:2,serveurNb:0,serveurDuree:2,
    tblNb:0,tblHousse:false,mdNb:0,mdHousse:false,nappesOn:false,nappesNb:null,
    sale:false,sucre:false,fromage:false,mixte:false,vege:false,
    verresPer:2,pBiere:0.7,pBlanc:0.2,pRouge:0.1,rose:0,futs:0,cremant:0,champagne:0,alcoolAutre:0,softAutre:0,
    choice:{},choiceOther:{},comment:{}});
  S.type=keep;
  const sx=document.getElementById('sx'); if(sx) sx.value='';
  const st=document.getElementById('ib-status'); if(st) st.textContent='';
  render();
}

// ── Import Sextan ────────────────────────────────────────────────────────────
function mapSextanToForm(ev){
  const p=ev.project||{};
  const client=(p.client&&p.client.name||"").trim();
  const pick=t=>(t&&t!=="00:00:00"&&/^\d{2}:\d{2}/.test(t))?String(t).slice(0,5):"";
  const heure=pick(ev.organizer_arrival)||pick(ev.client_arrival)||pick(ev.start_time)||pick(ev.end_time)||"";
  const nb=+ev.nbr_pax||0;
  const type=(ev.type||"").toUpperCase();
  let model="chaud";
  if(/COCKTAIL|APERITIF|DINATOIRE/.test(type)) model="cocktail";
  const items=[];
  const steps=(ev.menu&&ev.menu.steps)||[];
  const stypes=steps.map(s=>(s.step_type||"").toUpperCase());
  steps.forEach(s=>(s.products||[]).forEach(pr=>{
    const q=(pr.real_quantity!=null)?pr.real_quantity:Math.round((+pr.quantity||0)*nb);
    items.push({name:(pr.name||"").toLowerCase(), qty:+q||0});
  }));
  const bill=(ev.billing&&ev.billing.items)||[];
  bill.forEach(b=>items.push({name:(b.name||"").toLowerCase(), qty:+b.qt||0}));
  const cats=bill.map(b=>(b.category||"").toLowerCase());
  const names=items.map(i=>i.name);
  const has=re=>names.some(n=>re.test(n));
  const catHas=re=>cats.some(c=>re.test(c));
  const qtyOf=re=>{ const it=items.find(i=>re.test(i.name)); return it?Math.round(it.qty):0; };
  const alcool=catHas(/alcool|vin/)||has(/\bvin\b|bi[eè]re|champagne|cr[eé]mant|ros[eé]|alcool|prosecco/);
  const softs=catHas(/boisson/)||has(/\bjus\b|cola|limonade|\beau\b|soft|citronnade|sirop|gazeus/);
  const service=((ev.staff||[]).length>0)||catHas(/personnel|service/)||has(/serveur|ma[iî]tre.?d.?h|vacation|extra service/);
  const entree=has(/entr[eé]e/)||stypes.some(t=>/ENTREE/.test(t));
  const dessert=has(/dessert|fromage|merveilleux|tartelette|cookie|financier|brownie/)||stypes.some(t=>/DESSERT|FROMAGE/.test(t));
  const plat=model==='cocktail'?false:(has(/\bplat\b|repas|carbonnade|waterzoi|blanquette|curry|buffet|volaille|poisson/)||stypes.some(t=>/PLAT|REPAS/.test(t))||true);
  const rose=alcool?qtyOf(/ros[eé]/):0, futs=alcool?qtyOf(/f[uû]t/):0;
  const cremant=alcool?qtyOf(/cr[eé]mant/):0, champagne=alcool?qtyOf(/champagne/):0;
  const tables=qtyOf(/\btable/);
  const nappe=has(/\bnappe|nappage|housse/);
  return {model,client,date:ev.date||"",heure,nb,alcool,softs,service,entree,plat,dessert,
    rose,futs,cremant,champagne,tables,nappe,sextan:String(ev.id||"")};
}
function applySextan(ev){
  const m=mapSextanToForm(ev);
  S.type=m.model; S.client=m.client; S.date=m.date; S.heure=m.heure; S.nb=m.nb; S.sextan=m.sextan;
  S.alcool=m.alcool; S.softs=m.softs;
  S.rose=m.rose; S.futs=m.futs; S.cremant=m.cremant; S.champagne=m.champagne;
  S.serveurNb = m.service ? RUd(m.nb,40) : 0;
  S.mhOn = S.serveurNb>=3;
  if(m.tables>0){ S.tblNb=m.tables; S.tblHousse=m.nappe; S.nappesOn=false; }
  else { S.tblNb=0; S.tblHousse=false; S.nappesOn=m.nappe; }
  if(m.model!=='cocktail'){ S.entree=m.entree; S.plat=m.plat; S.dessert=m.dessert; }
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===S.type));
  render();
  const sx=document.getElementById('sx'); if(sx) sx.value=S.sextan;
  const st=document.getElementById('ib-status');
  if(st) st.innerHTML='<b>✓ Réception '+esc(S.sextan)+'</b> · '+esc(TITLES[S.type])+' · '+(S.nb||0)+' pers.'+(S.client?' · '+esc(S.client):'');
}
async function importSextan(){
  const st=document.getElementById('ib-status');
  const id=(S.sextan||"").trim();
  if(!id){ if(st) st.textContent='Renseigne un numéro.'; return; }
  if(st) st.textContent='Chargement…';
  let r;
  try{ r=await fetch("/api/sextan?id="+encodeURIComponent(id)); }
  catch(e){ r=null; } // échec réseau (hors ligne / pas de serveur) → repli collage
  if(r){
    const j=await r.json().catch(()=>null);
    if(!r.ok){ if(st) st.textContent='Sextan : '+((j&&j.error)||('erreur '+r.status)); return; }
    const ev=(j&&j.data&&j.data[0])||(j&&j.data)||j;
    if(!ev||!ev.id){ if(st) st.textContent='Réception '+id+' introuvable.'; return; }
    applySextan(ev); return;
  }
  const paste=prompt("Serveur injoignable (mode hors ligne).\n\nColle ici le JSON event_details de la réception "+id+" (ou laisse vide pour annuler) :","");
  if(!paste){ if(st) st.textContent=''; return; }
  try{ let j=JSON.parse(paste); let ev=(j.data&&j.data[0])||j.data||j; applySextan(ev); }
  catch(err){ if(st) st.textContent='JSON invalide : '+err.message; }
}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

render();
</script>
