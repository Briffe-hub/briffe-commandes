[build]
  functions = "netlify/functions"

[functions]
  external_node_modules = ["@netlify/blobs"]

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/process"
  to = "/.netlify/functions/process"
  status = 200

[[redirects]]
  from = "/api/addresses"
  to = "/.netlify/functions/addresses"
  status = 200
