<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#0f0f0f;color:#e8e8e0;min-height:100vh}
button{font-family:'DM Mono',monospace;cursor:pointer}
.header{border-bottom:1px solid #1e1e1e;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;background:#111;position:sticky;top:0;z-index:10}
.logo{font-size:12px;letter-spacing:.15em;color:#444;text-transform:uppercase}
.logo span{color:#e8e8e0}
.header-right{display:flex;gap:8px;align-items:center}
.main{padding:24px 28px;max-width:920px;margin:0 auto}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%}
.btn{font-size:11px;letter-spacing:.1em;padding:8px 18px;border-radius:3px;text-transform:uppercase;border:1px solid #2a2a2a;background:transparent;color:#666;white-space:nowrap}
.btn:hover{border-color:#444;color:#aaa}
.btn.primary{border-color:#e8e8e0;background:#e8e8e0;color:#0f0f0f}
.btn.primary:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.connect-box{border:1px solid #1e1e1e;border-radius:8px;padding:56px 48px;text-align:center;background:#111;margin-top:40px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-label{font-size:10px;color:#444;letter-spacing:.14em;text-transform:uppercase}
.count{font-size:11px;color:#333;padding:2px 8px;border:1px solid #1e1e1e;border-radius:3px;margin-left:10px}
.email-row{border:1px solid #1a1a1a;border-radius:6px;margin-bottom:6px;overflow:hidden;background:#111}
.email-head{display:flex;align-items:center;padding:13px 16px;gap:10px}
.from{font-size:12px;color:#555;min-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subj{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.date{font-size:11px;color:#333;white-space:nowrap}
.result-box{border-top:1px solid #1a1a1a;padding:14px 16px}
.liv-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #161616}
.liv-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.liv-title{font-size:10px;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px}
.f-label{font-size:10px;color:#3a3a3a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.f-value{font-size:13px;color:#b0b0a8}
.action-bar{border-top:1px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:11px;border-radius:3px;padding:3px 9px;flex:1}
.tag.ok{color:#22c55e;background:#22c55e0e;border:1px solid #22c55e33}
.tag.warn{color:#f59e0b;background:#f59e0b0e;border:1px solid #f59e0b33}
.loading-row{padding:12px 16px;color:#444;font-size:12px;border-top:1px solid #1a1a1a}
.empty{padding:64px 0;text-align:center;color:#333;font-size:13px;line-height:2}
.error-msg{color:#ef4444;font-size:12px;margin-top:12px}
.hint{font-size:11px;color:#2a2a2a;line-height:1.8;margin-top:20px}
.tab-btn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:#444;cursor:pointer}
.tab-btn.active{color:#e8e8e0;border-bottom-color:#e8e8e0}
.tab-btn:hover{color:#888}
#tab-admin-panel{}
.addr-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:12px}
.addr-addr{flex:1;color:#888}
.addr-sheet{min-width:200px;color:#e8e8e0}
.addr-date{min-width:100px;color:#333;font-size:11px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:28px;max-width:480px;width:90%;font-family:'DM Mono',monospace}
.modal-title{font-size:13px;font-weight:500;color:#e8e8e0;margin-bottom:6px}
.modal-sub{font-size:11px;color:#555;margin-bottom:20px;line-height:1.6}
.modal-addr{font-size:12px;color:#f59e0b;background:#f59e0b0e;border:1px solid #f59e0b33;border-radius:3px;padding:6px 10px;margin-bottom:20px}
.modal-label{font-size:10px;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.modal select{font-family:'DM Mono',monospace;font-size:12px;background:#0f0f0f;color:#e8e8e0;border:1px solid #2a2a2a;border-radius:3px;padding:8px 10px;width:100%;margin-bottom:16px;appearance:none}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span>Briffe</span> · commandes appels d'offre</div>
  <div class="header-right" id="header-right"></div>
</div>
<div id="tab-bar" style="display:none;border-bottom:1px solid #1e1e1e;background:#111;padding:0 28px">
  <button class="tab-btn active" id="tab-emails" onclick="showTab('emails')">Commandes</button>
  <button class="tab-btn" id="tab-admin" onclick="showTab('admin')">Adresses</button>
</div>
<div id="tab-admin-panel" style="display:none;padding:24px 28px;max-width:920px;margin:0 auto;min-height:200px;background:#0f0f0f;color:#e8e8e0">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div style="font-size:10px;color:#444;letter-spacing:.14em;text-transform:uppercase">Base d'adresses mémorisées</div>
    <button class="btn" onclick="loadAddresses()">↻ Actualiser</button>
  </div>
  <div id="addr-list"><div class="empty">Chargement…</div></div>
</div>
<div class="main" id="main">
  <div class="connect-box">
    <div style="font-size:18px;margin-bottom:8px">Connexion Google requise</div>
    <div style="font-size:13px;color:#555;margin-bottom:28px;line-height:1.7">Accès Gmail, Google Sheets et Google Drive.<br>Aucune donnée stockée hors de votre session.</div>
    <button class="btn primary" onclick="signIn()">Connecter Google</button>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <div class="hint">Connectez-vous avec logistique@briffe.me</div>
  </div>
</div>
<script>
const CLIENT_ID = "846004846641-mh9q8v3mcr9c8n8keor84tfungsdn9bo.apps.googleusercontent.com";
const SHEETS_ID = "1ySJ7ORWl_D50WX-0cyJAcrHBCq6orDcFFpGUSzL2GIU";
const GMAIL_USER = "logistique%40briffe.me";
const TRAITE_LABEL = "[CONSIGNERIE] traités";

const SHEET_MAP = {
  // Mapping par nom exact de prestation Consignerie (normalisé)
  // EuraTech
  "petit dejeuner simple": "[EuraTech] PDJ Simple",
  "petit dejeuner elabore et sain": "[EuraTech] PDJ élaboré & sain",
  "petit dejeuner elabore": "[EuraTech] PDJ élaboré & sain",
  "pdj elabore et sain": "[EuraTech] PDJ élaboré & sain",
  "pause cafe simple": "[EuraTech] PC Simple",
  "pause cafe gourmande": "[EuraTech] PC Gourmande",
  // UnivLille
  "petit dejeuner univlille": "[UnivLille] PDJ",
  "formule pdj": "[UnivLille] PDJ",
  "formule pc": "[UnivLille] PC",
  "pause cafe univlille": "[UnivLille] PC",
  // SciencePo
  "petit dejeuner sciencespo": "[SciencePo] PDJ",
  "petit dejeuner sciences po": "[SciencePo] PDJ",
  // Carsat
  "petit dejeuner classique": "[Carsat] PDJ Classique",
  "carsat pdj classique": "[Carsat] PDJ Classique",
  "pause cafe carsat": "[Carsat] PC",
  "buffet carsat": "[Carsat] Buffet",
  // CCI
  "pdj standard": "[CCI] PDJ standard",
  "pdj prestige": "[CCI] PDJ Prestige",
  "pause cafe cci": "[CCI] PC",
};

let TOKEN=null, LABEL_ID=null, EMAILS=[], ORDERS={};

const ALL_SHEETS = [
  "[UnivLille] PDJ",
  "[UnivLille] PC",
  "[EuraTech] PDJ Simple",
  "[EuraTech] PDJ élaboré & sain",
  "[EuraTech] PC Simple",
  "[EuraTech] PC Gourmande",
  "[SciencePo] PDJ",
  "[Carsat] PDJ Classique",
  "[Carsat] PC",
  "[Carsat] Buffet",
  "[CCI] PDJ standard",
  "[CCI] PDJ Prestige",
  "[CCI] PC"
];

const ALL_CLIENTS = ["EuraTech", "UnivLille", "SciencePo", "Carsat", "CCI", "Autre"];

// client (normalized) + prestation keywords -> sheetName
const CLIENT_PRESTATION_MAP = {
  "euratech": [
    { keywords: ["elabore", "sain"],    sheet: "[EuraTech] PDJ élaboré & sain" },
    { keywords: ["gourmande"],           sheet: "[EuraTech] PC Gourmande" },
    { keywords: ["pause", "cafe", "pc"], sheet: "[EuraTech] PC Simple" },
    { keywords: ["dejeuner", "pdj"],     sheet: "[EuraTech] PDJ Simple" },
  ],
  "univlille": [
    { keywords: ["pause", "cafe", "pc"], sheet: "[UnivLille] PC" },
    { keywords: ["dejeuner", "pdj"],     sheet: "[UnivLille] PDJ" },
  ],
  "sciencespo": [
    { keywords: ["dejeuner", "pdj"],     sheet: "[SciencePo] PDJ" },
  ],
  "carsat": [
    { keywords: ["buffet"],              sheet: "[Carsat] Buffet" },
    { keywords: ["pause", "cafe", "pc"], sheet: "[Carsat] PC" },
    { keywords: ["dejeuner", "pdj"],     sheet: "[Carsat] PDJ Classique" },
  ],
  "cci": [
    { keywords: ["prestige"],            sheet: "[CCI] PDJ Prestige" },
    { keywords: ["pause", "cafe", "pc"], sheet: "[CCI] PC" },
    { keywords: ["dejeuner", "pdj"],     sheet: "[CCI] PDJ standard" },
  ],
};

function resolveSheetFromClientAndPrestation(client, typePrestation) {
  var clientKey = normalize(client || "");
  var tp = normalize(typePrestation || "");
  var rules = CLIENT_PRESTATION_MAP[clientKey] || [];
  for (var r of rules) {
    if (r.keywords.some(function(k) { return tp.includes(k); })) return r.sheet;
  }
  return null;
}

async function lookupAddress(address) {
  const r = await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "lookup", address })
  });
  return r.json();
}

async function saveAddress(address, client) {
  await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "save", address: address, client: client })
  });
}

function showAddressModal(address, typePrestation, callback) {
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = '<div class="modal">'
    + '<div class="modal-title">Adresse non reconnue</div>'
    + '<div class="modal-sub">Choisissez le client associ&#233; &#224; cette adresse. Il sera m&#233;moris&#233; pour les prochaines commandes.</div>'
    + '<div class="modal-addr">' + esc(address) + '</div>'
    + '<div class="modal-label">Prestation : ' + esc(typePrestation) + '</div>'
    + '<div class="modal-label" style="margin-top:12px">Client</div>'
    + '<select id="modal-client">'
    + ALL_CLIENTS.map(function(c){ return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join("")
    + '</select>'
    + '<div class="modal-btns">'
    + '<button class="btn" id="modal-cancel">Annuler</button>'
    + '<button class="btn primary" id="modal-confirm">&#8594; Confirmer et m&#233;moriser</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  document.getElementById("modal-cancel").onclick = function() { document.body.removeChild(overlay); };
  document.getElementById("modal-confirm").onclick = function() {
    var selectedClient = document.getElementById("modal-client").value;
    document.body.removeChild(overlay);
    callback(selectedClient);
  };
}
