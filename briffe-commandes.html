<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briffe · Commandes appels d'offre</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#0f0f0f;color:#e8e8e0;min-height:100vh}
button{font-family:'DM Mono',monospace;cursor:pointer}
.header{border-bottom:1px solid #1e1e1e;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;background:#111;position:sticky;top:0;z-index:10}
.logo{font-size:12px;letter-spacing:.15em;color:#444;text-transform:uppercase}
.logo span{color:#e8e8e0}
.header-right{display:flex;gap:8px;align-items:center}
.main{padding:24px 28px;max-width:920px;margin:0 auto}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%}
.btn{font-size:11px;letter-spacing:.1em;padding:8px 18px;border-radius:3px;text-transform:uppercase;border:1px solid #2a2a2a;background:transparent;color:#666;white-space:nowrap}
.btn:hover{border-color:#444;color:#aaa}
.btn.primary{border-color:#e8e8e0;background:#e8e8e0;color:#0f0f0f}
.btn.primary:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.connect-box{border:1px solid #1e1e1e;border-radius:8px;padding:56px 48px;text-align:center;background:#111;margin-top:40px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-label{font-size:10px;color:#444;letter-spacing:.14em;text-transform:uppercase}
.count{font-size:11px;color:#333;padding:2px 8px;border:1px solid #1e1e1e;border-radius:3px;margin-left:10px}
.email-row{border:1px solid #1a1a1a;border-radius:6px;margin-bottom:6px;overflow:hidden;background:#111}
.email-head{display:flex;align-items:center;padding:13px 16px;gap:10px}
.from{font-size:12px;color:#555;min-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subj{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.date{font-size:11px;color:#333;white-space:nowrap}
.result-box{border-top:1px solid #1a1a1a;padding:14px 16px}
.liv-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #161616}
.liv-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.liv-title{font-size:10px;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px}
.f-label{font-size:10px;color:#3a3a3a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.f-value{font-size:13px;color:#b0b0a8}
.action-bar{border-top:1px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;gap:8px}
.tag{font-size:11px;border-radius:3px;padding:3px 9px;flex:1}
.tag.ok{color:#22c55e;background:#22c55e0e;border:1px solid #22c55e33}
.tag.warn{color:#f59e0b;background:#f59e0b0e;border:1px solid #f59e0b33}
.loading-row{padding:12px 16px;color:#444;font-size:12px;border-top:1px solid #1a1a1a}
.empty{padding:64px 0;text-align:center;color:#333;font-size:13px;line-height:2}
.error-msg{color:#ef4444;font-size:12px;margin-top:12px}
.hint{font-size:11px;color:#2a2a2a;line-height:1.8;margin-top:20px}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span>Briffe</span> · commandes appels d'offre</div>
  <div class="header-right" id="header-right"></div>
</div>
<div class="main" id="main">
  <div class="connect-box">
    <div style="font-size:18px;margin-bottom:8px">Connexion Google requise</div>
    <div style="font-size:13px;color:#555;margin-bottom:28px;line-height:1.7">Accès Gmail (lecture + archivage) et Google Sheets (écriture).<br>Aucune donnée stockée hors de votre session.</div>
    <button class="btn primary" onclick="signIn()">→ Connecter Google</button>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <div class="hint">Permissions : gmail.modify · spreadsheets<br>Connectez-vous avec logistique@briffe.me</div>
  </div>
</div>
<script>
const CLIENT_ID = "846004846641-mh9q8v3mcr9c8n8keor84tfungsdn9bo.apps.googleusercontent.com";
const SHEETS_ID = "1ySJ7ORWl_D50WX-0cyJAcrHBCq6orDcFFpGUSzL2GIU";
const GMAIL_USER = "logistique%40briffe.me";
const TRAITE_LABEL = "Traités";

const SHEET_MAP = {
  "univlille pdj": "[UnivLille] PDJ",
  "univlille pc": "[UnivLille] PC",
  "euratech pdj simple": "[EuraTech] PDJ Simple",
  "euratech pdj elabore": "[EuraTech] PDJ élaboré & sain",
  "euratech pdj sain": "[EuraTech] PDJ élaboré & sain",
  "euratech pc simple": "[EuraTech] PC Simple",
  "euratech pc gourmande": "[EuraTech] PC Gourmande",
  "sciencespo pdj": "[SciencePo] PDJ",
  "science po pdj": "[SciencePo] PDJ",
};

let TOKEN=null, LABEL_ID=null, EMAILS=[], ORDERS={};

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/spreadsheets",
    callback: (resp) => {
      if (resp.error) { document.getElementById("auth-error").textContent=resp.error; document.getElementById("auth-error").style.display="block"; return; }
      TOKEN = resp.access_token;
      onSignedIn();
    },
  });
  client.requestAccessToken({ hint: "logistique@briffe.me" });
}

async function gFetch(url, opts={}) {
  const r = await fetch(url, { ...opts, headers: { Authorization: "Bearer "+TOKEN, "Content-Type": "application/json", ...(opts.headers||{}) } });
  return r.json();
}

async function onSignedIn() {
  renderHeader();
  document.getElementById("main").innerHTML = '<div class="empty">Récupération des emails non lus…</div>';
  try {
    LABEL_ID = await getOrCreateLabel(TRAITE_LABEL);
    EMAILS = await fetchUnreadEmails();
    renderEmailList();
  } catch(e) { document.getElementById("main").innerHTML = '<div class="empty">Erreur : '+e.message+'</div>'; }
}

async function fetchUnreadEmails() {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages?q=is:unread+from:noreply@consignerie.com+has:attachment");
  if (!data.messages || !data.messages.length) return [];
  const details = await Promise.all(data.messages.map(m =>
    gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+m.id+"?format=full")
  ));
  return details.filter(m => findPdfParts(m.payload && m.payload.parts).length > 0);
}

async function fetchAttachment(messageId, attachmentId) {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+messageId+"/attachments/"+attachmentId);
  return data.data.replace(/-/g,"+").replace(/_/g,"/");
}

async function getOrCreateLabel(name) {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/labels");
  const existing = (data.labels||[]).find(l => l.name===name);
  if (existing) return existing.id;
  const created = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/labels", {
    method:"POST", body: JSON.stringify({name, labelListVisibility:"labelShow", messageListVisibility:"show"})
  });
  return created.id;
}

async function archiveEmail(messageId) {
  await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+messageId+"/modify", {
    method:"POST", body: JSON.stringify({addLabelIds:[LABEL_ID], removeLabelIds:["UNREAD","INBOX"]})
  });
}

function getHeader(msg, name) {
  return ((msg.payload && msg.payload.headers)||[]).find(h => h.name.toLowerCase()===name.toLowerCase())&&((msg.payload && msg.payload.headers)||[]).find(h => h.name.toLowerCase()===name.toLowerCase()).value || "";
}

function findPdfParts(parts, acc=[]) {
  if (!parts) return acc;
  for (const p of parts) {
    if (p.mimeType==="application/pdf" && p.body && p.body.attachmentId) acc.push(p);
    if (p.parts) findPdfParts(p.parts, acc);
  }
  return acc;
}

function getPlainBody(payload) {
  if (!payload) return "";
  function dig(parts) {
    if (!parts) return "";
    let txt = "";
    for (const p of parts) {
      if (p.mimeType==="text/plain" && p.body && p.body.data) {
        try { txt += atob(p.body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e){}
      }
      if (p.parts) txt += dig(p.parts);
    }
    return txt;
  }
  let body = dig(payload.parts);
  if (!body && payload.body && payload.body.data) {
    try { body = atob(payload.body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e){}
  }
  return body;
}

async function extractFromBody(body, subject) {
  const prompt = "Analyse ce corps d'email de La Consignerie. Il peut y avoir plusieurs livraisons dans le même email.\n\nSujet: "+subject+"\n\nCorps:\n"+body+"\n\nExtrait pour chaque livraison : date, type de prestation, nombre de personnes (ignorer la vaisselle), lieu, salle.\nCLIENT depuis le nom dans le mail : UNIVERSITÉ DE LILLE=UnivLille, EURATECH=EuraTech, SCIENCES PO=SciencePo, CARSAT=Carsat.\nSHEET_KEY = client+prestation minuscules sans accents ex: univlille pdj / euratech pc simple / sciencespo pdj.\n\nRéponds UNIQUEMENT en JSON valide sans markdown :\n{\"numero_commande\":\"DEV-XXXXX\",\"client\":\"UnivLille\",\"livraisons\":[{\"date_evenement\":\"JJ/MM/AAAA\",\"type_prestation\":\"petit dejeuner\",\"sheet_key\":\"univlille pdj\",\"nombre_personnes\":42,\"lieu\":\"adresse\",\"salle\":\"nom salle\"}]}";

  const resp = await fetch("/api/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:[{type:"text",text:prompt}]}]
    })
  });
  const data = await resp.json();
  const text = ((data.content||[]).find(b => b.type==="text")||{}).text || "{}";
  try { return JSON.parse(text.replace(/```json|```/g,"").trim()); }
  catch { return null; }
}

function normalize(s) {
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function resolveSheet(liv) {
  const key = normalize(liv.sheet_key||"");
  if (SHEET_MAP[key]) return SHEET_MAP[key];
  for (const [k,v] of Object.entries(SHEET_MAP)) {
    if (key.includes(k)||k.includes(key)) return v;
  }
  const tp = normalize(liv.type_prestation||"");
  for (const [k,v] of Object.entries(SHEET_MAP)) {
    if (tp.includes(k)||k.includes(tp)) return v;
  }
  return null;
}

async function updateSheet(sheetName, nb) {
  const enc = encodeURIComponent(sheetName);
  const data = await gFetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEETS_ID+"/values/"+enc);
  const rows = data.values||[];
  let targetRange = null;
  for (let i=0;i<rows.length;i++) {
    for (let j=0;j<rows[i].length;j++) {
      if ((rows[i][j]||"").toString().toLowerCase().includes("nombre de personnes")) {
        if (j+1 < (rows[i]||[]).length) targetRange = sheetName+"!"+String.fromCharCode(65+j+1)+(i+1);
        else if (rows[i+1]) targetRange = sheetName+"!"+String.fromCharCode(65+j)+(i+2);
        break;
      }
    }
    if (targetRange) break;
  }
  if (!targetRange) throw new Error("Cellule introuvable dans \""+sheetName+"\"");
  await gFetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEETS_ID+"/values/"+encodeURIComponent(targetRange)+"?valueInputOption=USER_ENTERED",
    {method:"PUT", body:JSON.stringify({values:[[nb]]})});
  return targetRange;
}

function autoPrint(base64) {
  const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  const blob = new Blob([bytes],{type:"application/pdf"});
  const url = URL.createObjectURL(blob);
  const iframe = document.createElement("iframe");
  iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
  iframe.src = url;
  document.body.appendChild(iframe);
  iframe.onload = () => {
    setTimeout(() => {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
      catch { window.open(url,"_blank"); }
      setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); },3000);
    },800);
  };
}

async function processEmail(msg) {
  const id = msg.id;
  ORDERS[id] = {status:"loading"};
  renderEmailList();
  try {
    const body = getPlainBody(msg.payload);
    console.log("Body length:", body.length, "| Preview:", body.substring(0,300));

    const subject = getHeader(msg,"subject");
    const extracted = await extractFromBody(body, subject);
    console.log("Extracted:", JSON.stringify(extracted));

    if (!extracted || !extracted.livraisons || !extracted.livraisons.length)
      throw new Error("Extraction échouée — corps du mail vide ou non reconnu (body length: "+body.length+")");

    const sheetResults=[], sheetErrors=[];
    for (const liv of extracted.livraisons) {
      const sheetName = resolveSheet(liv);
      if (sheetName) {
        try { const range = await updateSheet(sheetName, liv.nombre_personnes); sheetResults.push({sheetName,range,nb:liv.nombre_personnes}); }
        catch(e) { sheetErrors.push(e.message); }
      } else {
        sheetErrors.push("Onglet non reconnu : "+liv.type_prestation+" ("+extracted.client+") — sheet_key: "+liv.sheet_key);
      }
    }

    const pdfParts = findPdfParts(msg.payload && msg.payload.parts);
    try { await archiveEmail(msg.id); } catch(e) { console.warn("Archive failed",e); }

    ORDERS[id] = {
      status: sheetResults.length ? "success" : "partial",
      data: extracted,
      sheetResult: sheetResults.length ? sheetResults : null,
      error: sheetErrors.length ? sheetErrors.join(" | ") : null,
      pdfParts,
      msgId: msg.id
    };
    renderEmailList();

    for (let i=0;i<pdfParts.length;i++) {
      setTimeout(async () => {
        const b = await fetchAttachment(msg.id, pdfParts[i].body.attachmentId);
        autoPrint(b);
      }, i*2500);
    }

  } catch(e) {
    console.error("processEmail error:", e);
    ORDERS[id] = {status:"error", error:e.message};
    renderEmailList();
  }
}

async function processAll() {
  const btn = document.getElementById("btn-all");
  if (btn) { btn.disabled=true; btn.textContent="Traitement en cours…"; }
  for (const msg of EMAILS) {
    const st = ORDERS[msg.id] && ORDERS[msg.id].status;
    if (!st || st==="error") { await processEmail(msg); await new Promise(r=>setTimeout(r,500)); }
  }
  if (btn) { btn.disabled=false; btn.textContent="→ Tout traiter ("+EMAILS.length+")"; }
}

const STATUS = {
  idle:    {label:"En attente", color:"#555"},
  loading: {label:"Traitement…",color:"#f59e0b"},
  success: {label:"Traité ✓",   color:"#22c55e"},
  partial: {label:"Partiel",    color:"#f59e0b"},
  error:   {label:"Erreur",     color:"#ef4444"},
};

function pill(color,label) {
  return '<span class="pill" style="border:1px solid '+color+'44;background:'+color+'11;color:'+color+'"><span class="dot" style="background:'+color+'"></span>'+label+'</span>';
}

function field(label, value) {
  if (!value && value!==0) return "";
  return '<div><div class="f-label">'+label+'</div><div class="f-value">'+esc(String(value))+'</div></div>';
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderHeader() {
  document.getElementById("header-right").innerHTML =
    pill("#22c55e","Connecté") +
    '<button class="btn" onclick="refresh()">↻ Actualiser</button>';
}

function renderEmailList() {
  if (!EMAILS.length) {
    document.getElementById("main").innerHTML = '<div class="empty">Aucun email non lu de noreply@consignerie.com.<br><span style="color:#2a2a2a">Les commandes traitées sont dans "'+TRAITE_LABEL+'".</span></div>';
    return;
  }
  let html = '<div class="toolbar"><div style="display:flex;align-items:center"><span class="section-label">Emails non lus</span><span class="count">'+EMAILS.length+'</span></div><button id="btn-all" class="btn primary" onclick="processAll()">→ Tout traiter ('+EMAILS.length+')</button></div>';

  for (const msg of EMAILS) {
    const order = ORDERS[msg.id];
    const status = (order && order.status) || "idle";
    const st = STATUS[status];
    const from = getHeader(msg,"from").replace(/<.*>/,"").trim();
    const subj = getHeader(msg,"subject");
    const date = new Date(getHeader(msg,"date")).toLocaleDateString("fr-FR");

    html += '<div class="email-row"><div class="email-head">'+pill(st.color,st.label)+'<span class="from">'+esc(from)+'</span><span class="subj">'+esc(subj)+'</span><span class="date">'+date+'</span>';
    if (!order || status==="error") html += '<button class="btn" onclick="processEmail(EMAILS.find(function(m){return m.id===\''+msg.id+'\'}))">→ Traiter</button>';
    html += '</div>';

    if (status==="loading") html += '<div class="loading-row">Extraction en cours…</div>';

    if (order && order.data) {
      const d = order.data;
      const livs = d.livraisons || [];
      html += '<div class="result-box">';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:12px">'+field("Client",d.client)+field("N° commande",d.numero_commande)+'</div>';
      livs.forEach(function(l,i) {
        html += '<div class="liv-block"><div class="liv-title">Livraison '+(i+1)+'</div><div class="grid3">'+field("Prestation",l.type_prestation)+field("Personnes",l.nombre_personnes)+field("Date",l.date_evenement)+field("Lieu",l.lieu)+field("Salle",l.salle)+'</div></div>';
      });
      html += '</div><div class="action-bar">';
      if (order.sheetResult && order.sheetResult.length) {
        html += '<span class="tag ok">✓ Sheets — '+order.sheetResult.map(function(r){return '"'+esc(r.sheetName)+'" '+r.nb+' pers.';}).join(", ")+'</span>';
      } else {
        html += '<span class="tag warn">⚠ '+esc(order.error||"Onglet non mis à jour")+'</span>';
      }
      if (status==="success") html += pill("#22c55e","BL imprimé · archivé");
      const oid = msg.id;
      html += '<button class="btn" onclick="reprintOrder(\''+oid+'\')">⎙ Réimprimer</button>';
      html += '</div>';
    }

    if (status==="error" && !(order && order.data)) {
      html += '<div class="loading-row" style="color:#ef4444">✗ '+esc(order && order.error)+'</div>';
    }
    html += '</div>';
  }
  document.getElementById("main").innerHTML = html;
}

async function reprintOrder(msgId) {
  const order = ORDERS[msgId];
  if (!order || !order.pdfParts) return;
  for (let i=0;i<order.pdfParts.length;i++) {
    setTimeout(async function() {
      const b = await fetchAttachment(order.msgId, order.pdfParts[i].body.attachmentId);
      autoPrint(b);
    }, i*2500);
  }
}

async function refresh() {
  EMAILS=[]; ORDERS={};
  document.getElementById("main").innerHTML = '<div class="empty">Actualisation…</div>';
  try {
    LABEL_ID = LABEL_ID || await getOrCreateLabel(TRAITE_LABEL);
    EMAILS = await fetchUnreadEmails();
    renderEmailList();
  } catch(e) { document.getElementById("main").innerHTML = '<div class="empty">Erreur : '+e.message+'</div>'; }
}
</script>
</body>
</html>
