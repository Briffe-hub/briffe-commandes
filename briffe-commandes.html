<script>

const TRAITE_LABEL = "[CONSIGNERIE] traités";

  "petit dejeuner simple": "[EuraTech] PDJ Simple",
  "petit dejeuner elabore et sain": "[EuraTech] PDJ élaboré & sain",

  "[UnivLille] PDJ",

  "[EuraTech] PDJ Simple",
  "[EuraTech] PDJ élaboré & sain",
  "[EuraTech] PC Simple",
  "[EuraTech] PC Gourmande",
  "[SciencePo] PDJ",
  "[Carsat] PDJ Classique",
  "[Carsat] PC",
  "[Carsat] Buffet",
  "[CCI] PDJ standard",
  "[CCI] PDJ Prestige",
  "[CCI] PC"
];

async function lookupAddress(address) {
  const r = await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "lookup", address })
  });
  return r.json();
}

async function saveAddress(address, client, sheetName) {
  await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "save", address, client, sheetName })
  });
}

function showAddressModal(address, typePrestation, callback) {
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = '<div class="modal">'
    + '<div class="modal-title">Adresse non reconnue</div>'
    + '<div class="modal-sub">Cette adresse n&#39;est pas dans la base. Choisissez le bon de pr&eacute;paration &agrave; utiliser, puis confirmez pour m&eacute;moriser.</div>'
    + '<div class="modal-addr">' + esc(address) + '</div>'
    + '<div class="modal-label">Prestation détectée : ' + esc(typePrestation) + '</div>'
    + '<div class="modal-label" style="margin-top:12px">Bon de préparation</div>'
    + '<select id="modal-sheet">'
    + ALL_SHEETS.map(function(s) { return '<option value="'+esc(s)+'">'+esc(s)+'</option>'; }).join("")
    + '</select>'
    + '<div class="modal-btns">'
    + '<button class="btn" onclick="document.body.removeChild(document.querySelector(\'.modal-overlay\'))">Annuler</button>'
    + '<button class="btn primary" id="modal-confirm">→ Confirmer et mémoriser</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  document.getElementById("modal-confirm").onclick = function() {
    var selected = document.getElementById("modal-sheet").value;
    var clientName = selected.match(/\[(.+?)\]/);
    document.body.removeChild(overlay);
    callback(selected, clientName ? clientName[1] : "Inconnu");
  };
}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: [
      "https://www.googleapis.com/auth/gmail.modify",
      "https://www.googleapis.com/auth/spreadsheets",
      "https://www.googleapis.com/auth/drive",
      "https://www.googleapis.com/auth/calendar"
    ].join(" "),
    callback: function(resp) {
      if (resp.error) {
        document.getElementById("auth-error").textContent = resp.error;
        document.getElementById("auth-error").style.display = "block";
        return;
      }
      TOKEN = resp.access_token;
      onSignedIn();
    },
  });
  client.requestAccessToken({});
}

async function gFetch(url, opts) {
  opts = opts || {};
  const r = await fetch(url, {
    method: opts.method || "GET",
    headers: Object.assign({ "Authorization": "Bearer "+TOKEN, "Content-Type": "application/json" }, opts.headers || {}),
    body: opts.body || undefined
  });
  return r.json();
}

async function onSignedIn() {
  renderHeader();
  document.getElementById("main").innerHTML = '<div class="empty">Récupération des emails non lus…</div>';
  try {
    LABEL_ID = await getOrCreateLabel(TRAITE_LABEL);
    EMAILS = await fetchUnreadEmails();
    renderEmailList();
  } catch(e) {
    document.getElementById("main").innerHTML = '<div class="empty">Erreur : '+e.message+'</div>';
  }
}

async function fetchUnreadEmails() {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages?q=from:noreply@consignerie.com+has:attachment+in:inbox");
  if (!data.messages || !data.messages.length) return [];
  const details = await Promise.all(data.messages.map(function(m) {
    return gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+m.id+"?format=full");
  }));
  return details.filter(function(m) { return findPdfParts(m.payload && m.payload.parts).length > 0; });
}

async function fetchAttachment(messageId, attachmentId) {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+messageId+"/attachments/"+attachmentId);
  return data.data.replace(/-/g,"+").replace(/_/g,"/");
}

async function getOrCreateLabel(name) {
  const data = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/labels");
  const existing = (data.labels||[]).find(function(l) { return l.name===name; });
  if (existing) return existing.id;
  const created = await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/labels", {
    method: "POST",
    body: JSON.stringify({ name: name, labelListVisibility: "labelShow", messageListVisibility: "show" })
  });
  return created.id;
}

async function archiveEmail(messageId) {
  await gFetch("https://gmail.googleapis.com/gmail/v1/users/"+GMAIL_USER+"/messages/"+messageId+"/modify", {
    method: "POST",
    body: JSON.stringify({ addLabelIds: [LABEL_ID], removeLabelIds: ["UNREAD","INBOX"] })
  });
}

function getHeader(msg, name) {
  const headers = (msg.payload && msg.payload.headers) || [];
  const h = headers.find(function(h) { return h.name.toLowerCase() === name.toLowerCase(); });
  return h ? h.value : "";
}

function findPdfParts(parts, acc) {
  acc = acc || [];
  if (!parts) return acc;
  for (var i=0; i<parts.length; i++) {
    var p = parts[i];
    if (p.mimeType === "application/pdf" && p.body && p.body.attachmentId) acc.push(p);
    if (p.parts) findPdfParts(p.parts, acc);
  }
  return acc;
}

function b64decode(data) {
  var bin = atob(data.replace(/-/g,"+").replace(/_/g,"/"));
  var bytes = new Uint8Array(bin.length);
  for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function getPlainBody(payload) {
  if (!payload) return "";
  function dig(parts) {
    if (!parts) return "";
    var txt = "";
    for (var i=0; i<parts.length; i++) {
      var p = parts[i];
      if (p.mimeType === "text/plain" && p.body && p.body.data) {
        try { txt += b64decode(p.body.data); } catch(e) {}
      }
      if (p.parts) txt += dig(p.parts);
    }
    return txt;
  }
  var body = dig(payload.parts);
  if (!body && payload.body && payload.body.data) {
    try { body = b64decode(payload.body.data); } catch(e) {}
  }
  return body;
}

async function extractFromBody(body, subject) {
  var prompt = "Analyse ce corps d\'email de La Consignerie. Il peut y avoir plusieurs livraisons.\n\nSujet: "+subject+"\n\nCorps:\n"+body+"\n\nPour chaque livraison, extrais :\n- date_evenement (JJ/MM/AAAA)\n- heure_mise_en_place (ex: 08:00)\n- heure_evenement (fin du créneau de livraison)\n- type_prestation : reprends EXACTEMENT le nom du produit dans le tableau Produit/Qté, en minuscules, sans accents. Ex: \'petit dejeuner elabore et sain\', \'pause cafe simple\', \'petit dejeuner simple\'\n- nombre_personnes : la quantité associée au produit principal (ignorer vaisselle)\n- lieu, salle, contact\n\nCLIENT : déduis depuis le nom dans le mail :\n- UNIVERSITÉ DE LILLE, univ lille, faculté → UnivLille\n- EURATECHNOLOGIES, euratech, 165 avenue de bretagne → EuraTech\n- SCIENCES PO → SciencePo\n- CARSAT → Carsat\n- CCI → CCI\nSi inconnu, mets \'Inconnu\'.\n\nRéponds UNIQUEMENT en JSON valide sans markdown :\n{\"numero_commande\":\"DEV-XXXXX\",\"client\":\"EuraTech\",\"livraisons\":[{\"date_evenement\":\"JJ/MM/AAAA\",\"heure_mise_en_place\":\"08:00\",\"heure_evenement\":\"12:00\",\"type_prestation\":\"petit dejeuner elabore et sain\",\"nombre_personnes\":25,\"lieu\":\"165 Avenue de Bretagne, 59000 Lille\",\"salle\":null,\"contact\":\"Sandrine DESPREZ - 07 86 00 47 87\"}]}";

var resp = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 1500,
      messages: [{ role: "user", content: [{ type: "text", text: prompt }] }]
    })
  });
  var data = await resp.json();
  console.log("Claude raw:", JSON.stringify(data).substring(0,300));
  var text = ((data.content||[]).find(function(b) { return b.type==="text"; })||{}).text || "{}";
  console.log("Claude text:", text.substring(0,300));
  try { return JSON.parse(text.replace(/```json|```/g,"").trim()); }
  catch(e) { console.error("Parse error:", e); return null; }
}

function normalize(s) {
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function resolveSheet(liv) {
  var tp = normalize(liv.type_prestation || "");
  var client = normalize(liv.client || "");

  // 1. Direct match on type_prestation
  if (SHEET_MAP[tp]) return SHEET_MAP[tp];

  // 2. Partial match on type_prestation
  for (var k in SHEET_MAP) {
    if (tp === k || tp.includes(k) || k.includes(tp)) return SHEET_MAP[k];
  }

  // 3. Client + prestation combined key
  var combined = normalize((liv.client || "") + " " + tp);
  for (var k in SHEET_MAP) {
    if (combined.includes(k) || k.includes(combined)) return SHEET_MAP[k];
  }

  // 4. Fallback by prestation family
  if (tp.includes("elabore") || tp.includes("sain")) return "[EuraTech] PDJ élaboré & sain";
  if (tp.includes("gourmande")) return "[EuraTech] PC Gourmande";
  if (tp.includes("petit") || tp.includes("dejeuner") || tp.includes("pdj")) {
    if (client.includes("univlille") || client.includes("univ")) return "[UnivLille] PDJ";
    if (client.includes("sciencespo") || client.includes("sciences po")) return "[SciencePo] PDJ";
    if (client.includes("carsat")) return "[Carsat] PDJ Classique";
    if (client.includes("cci")) return "[CCI] PDJ standard";
    return "[EuraTech] PDJ Simple";
  }
  if (tp.includes("pause") || tp.includes("cafe") || tp.includes("pc")) {
    if (client.includes("univlille") || client.includes("univ")) return "[UnivLille] PC";
    if (client.includes("carsat")) return "[Carsat] PC";
    if (client.includes("cci")) return "[CCI] PC";
    return "[EuraTech] PC Simple";
  }
  if (tp.includes("buffet")) return "[Carsat] Buffet";
  return null;
}

function autoPrint(base64) {
  var bytes = Uint8Array.from(atob(base64), function(c) { return c.charCodeAt(0); });
  var blob = new Blob([bytes], { type: "application/pdf" });
  var url = URL.createObjectURL(blob);
  var iframe = document.createElement("iframe");
  iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
  iframe.src = url;
  document.body.appendChild(iframe);
  iframe.onload = function() {
    setTimeout(function() {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
      catch(e) { window.open(url, "_blank"); }
      setTimeout(function() { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 3000);
    }, 800);
  };
}

async function processEmail(msg) {
  var id = msg.id;
  ORDERS[id] = { status: "loading" };
  renderEmailList();

  try {
    var body = getPlainBody(msg.payload);
    console.log("Body length:", body.length, "| Preview:", body.substring(0,200));

    var subject = getHeader(msg, "subject");
    var extracted = await extractFromBody(body, subject);
    console.log("Extracted:", JSON.stringify(extracted));

    if (!extracted || !extracted.livraisons || !extracted.livraisons.length) {
      throw new Error("Extraction échouée — corps du mail vide ou non reconnu (body length: "+body.length+")");
    }

    var pdfParts = findPdfParts(msg.payload && msg.payload.parts);
    var sheetResults = [], sheetErrors = [];

    for (var li=0; li<extracted.livraisons.length; li++) {
      var liv = extracted.livraisons[li];
      var sheetName = null; // Determined by address DB or user input only
      console.log("Processing livraison", li, "lieu:", liv.lieu, "sheetName starts null");

      // Fetch matching BL PDF
      var blBase64 = null;
      var pdfPart = pdfParts[li] || pdfParts[0];
      if (pdfPart) {
        try { blBase64 = await fetchAttachment(msg.id, pdfPart.body.attachmentId); }
        catch(e) { console.warn("BL fetch failed:", e); }
      }

      // Address lookup
      var addrLookup = null;
      if (liv.lieu) {
        try { addrLookup = await lookupAddress(liv.lieu); } catch(e) {}
      }

      // If address known in DB, use saved sheetName
      console.log("addrLookup result:", JSON.stringify(addrLookup));
      if (addrLookup && addrLookup.found && addrLookup.data && addrLookup.data.sheetName) {
        sheetName = addrLookup.data.sheetName;
        liv.sheetName = sheetName;
        console.log("Address known:", liv.lieu, "->", sheetName);
      } else {
        // Address unknown: ALWAYS ask user, ignore fallback
        sheetName = await new Promise(function(resolve) {
          showAddressModal(liv.lieu || "Adresse inconnue", liv.type_prestation || "", function(selectedSheet, selectedClient) {
            liv.sheetName = selectedSheet;
            saveAddress(liv.lieu, selectedClient, selectedSheet).catch(function(){});
            resolve(selectedSheet);
          });
        });
      }

      try {
        var resp = await fetch("/api/process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            googleToken: TOKEN,
            livraison: liv,
            numero_commande: extracted.numero_commande,
            client: extracted.client,
            blBase64: blBase64
          })
        });
        var result = await resp.json();
        if (result.ok) {
          console.log("process result:", result.pdfFileId, "calEvent:", result.calEventLink, "sheetPdf:", result.sheetPdfBase64 ? result.sheetPdfBase64.length : "MISSING");
          sheetResults.push({
            sheetName: sheetName,
            nb: liv.nombre_personnes,
            pdfFileId: result.pdfFileId,
            pdfFileName: result.pdfFileName,
            calEventLink: result.calEventLink,
            sheetPdfBase64: result.sheetPdfBase64,
            blBase64: blBase64
          });
        } else {
          sheetErrors.push(sheetName+": "+(result.error||"Erreur inconnue"));
        }
      } catch(e) {
        sheetErrors.push(sheetName+": "+e.message);
      }
    }

    try { await archiveEmail(msg.id); } catch(e) { console.warn("Archive failed:", e); }

    ORDERS[id] = {
      status: sheetResults.length ? "success" : "partial",
      data: extracted,
      sheetResult: sheetResults.length ? sheetResults : null,
      error: sheetErrors.length ? sheetErrors.join(" | ") : null,
      pdfParts: pdfParts,
      msgId: msg.id
    };
    renderEmailList();

    // Auto-print: BL first, then sheet sequentially
    (async function() {
      for (var ri=0; ri<sheetResults.length; ri++) {
        var r = sheetResults[ri];
        if (r.blBase64) { autoPrint(r.blBase64); await new Promise(function(res){ setTimeout(res, 4000); }); }
        if (r.sheetPdfBase64) { autoPrint(r.sheetPdfBase64); await new Promise(function(res){ setTimeout(res, 4000); }); }
      }
    })();

  } catch(e) {
    console.error("processEmail error:", e);
    ORDERS[id] = { status: "error", error: e.message };
    renderEmailList();
  }
}

async function processAll() {
  var btn = document.getElementById("btn-all");
  if (btn) { btn.disabled = true; btn.textContent = "Traitement en cours…"; }
  for (var i=0; i<EMAILS.length; i++) {
    var msg = EMAILS[i];
    var st = ORDERS[msg.id] && ORDERS[msg.id].status;
    if (!st || st === "error") {
      await processEmail(msg);
      await new Promise(function(r) { setTimeout(r, 500); });
    }
  }
  if (btn) { btn.disabled = false; btn.textContent = "→ Tout traiter ("+EMAILS.length+")"; }
}

var STATUS = {
  idle:    { label: "En attente",  color: "#555" },
  loading: { label: "Traitement…", color: "#f59e0b" },
  success: { label: "Traité ✓",    color: "#22c55e" },
  partial: { label: "Partiel",     color: "#f59e0b" },
  error:   { label: "Erreur",      color: "#ef4444" }
};

function pill(color, label) {
  return '<span class="pill" style="border:1px solid '+color+'44;background:'+color+'11;color:'+color+'"><span class="dot" style="background:'+color+'"></span>'+label+'</span>';
}

function field(label, value) {
  if (!value && value !== 0) return "";
  return '<div><div class="f-label">'+label+'</div><div class="f-value">'+esc(String(value))+'</div></div>';
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderHeader() {
  document.getElementById("header-right").innerHTML =
    pill("#22c55e","Connecté") +
    '<button class="btn" onclick="refresh()">↻ Actualiser</button>';
  document.getElementById("tab-bar").style.display = "flex";
}

function renderEmailList() {
  if (!EMAILS.length) {
    document.getElementById("main").innerHTML = '<div class="empty">Aucun email non lu de noreply@consignerie.com.<br><span style="color:#2a2a2a">Les commandes traitées sont dans "'+TRAITE_LABEL+'".</span></div>';
    return;
  }

  var html = '<div class="toolbar"><div style="display:flex;align-items:center"><span class="section-label">Emails non lus</span><span class="count">'+EMAILS.length+'</span></div><button id="btn-all" class="btn primary" onclick="processAll()">→ Tout traiter ('+EMAILS.length+')</button></div>';

  for (var i=0; i<EMAILS.length; i++) {
    var msg = EMAILS[i];
    var order = ORDERS[msg.id];
    var status = (order && order.status) || "idle";
    var st = STATUS[status];
    var from = getHeader(msg,"from").replace(/<.*>/,"").trim();
    var subj = getHeader(msg,"subject");
    var date = new Date(getHeader(msg,"date")).toLocaleDateString("fr-FR");

    html += '<div class="email-row"><div class="email-head">'+pill(st.color,st.label);
    html += '<span class="from">'+esc(from)+'</span>';
    html += '<span class="subj">'+esc(subj)+'</span>';
    html += '<span class="date">'+date+'</span>';
    if (!order || status === "error") {
      html += '<button class="btn" onclick="processEmail(EMAILS.find(function(m){return m.id===\''+msg.id+'\'}))">→ Traiter</button>';
    }
    html += '</div>';

    if (status === "loading") {
      html += '<div class="loading-row">Extraction en cours…</div>';
    }

    if (order && order.data) {
      var d = order.data;
      var livs = d.livraisons || [];
      html += '<div class="result-box">';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:12px">';
      html += field("Client", d.client) + field("N° commande", d.numero_commande);
      html += '</div>';
      for (var li=0; li<livs.length; li++) {
        var l = livs[li];
        html += '<div class="liv-block"><div class="liv-title">Livraison '+(li+1)+'</div><div class="grid3">';
        html += field("Prestation", l.type_prestation);
        html += field("Personnes", l.nombre_personnes);
        html += field("Date", l.date_evenement);
        html += field("Mise en place", l.heure_mise_en_place);
        html += field("Lieu", l.lieu);
        html += field("Salle", l.salle);
        html += field("Contact", l.contact);
        html += '</div></div>';
      }
      html += '</div><div class="action-bar">';

      if (order.sheetResult && order.sheetResult.length) {
        var tags = order.sheetResult.map(function(r) {
          var t = '"'+esc(r.sheetName)+'" · '+r.nb+' pers.';
          if (r.calEventLink) t += ' <a href="'+r.calEventLink+'" target="_blank" style="color:#22c55e;text-decoration:none">📅</a>';
          if (r.pdfFileId) t += ' <a href="https://drive.google.com/file/d/'+r.pdfFileId+'" target="_blank" style="color:#22c55e;text-decoration:none">📄</a>';
          return t;
        }).join(" | ");
        html += '<span class="tag ok">✓ '+tags+'</span>';
      } else {
        html += '<span class="tag warn">⚠ '+esc(order.error||"Onglet non mis à jour")+'</span>';
      }

      if (status === "success") html += pill("#22c55e", "Imprimé · archivé");
      html += '<button class="btn" onclick="reprintBL(\''+msg.id+'\')">⎙ BL</button>';
      html += '<button class="btn" onclick="reprintSheet(\''+msg.id+'\')">⎙ Bon de prép.</button>';
      html += '</div>';
    }

    if (status === "error" && !(order && order.data)) {
      html += '<div class="loading-row" style="color:#ef4444">✗ '+esc(order && order.error)+'</div>';
    }
    html += '</div>';
  }

  document.getElementById("main").innerHTML = html;
}

async function reprintBL(msgId) {
  var order = ORDERS[msgId];
  if (!order || !order.sheetResult) return;
  for (var i=0; i<order.sheetResult.length; i++) {
    var r = order.sheetResult[i];
    if (r.blBase64) { autoPrint(r.blBase64); await new Promise(function(res){ setTimeout(res, 4000); }); }
  }
}

async function reprintSheet(msgId) {
  var order = ORDERS[msgId];
  if (!order || !order.sheetResult) return;
  for (var i=0; i<order.sheetResult.length; i++) {
    var r = order.sheetResult[i];
    if (r.sheetPdfBase64) { autoPrint(r.sheetPdfBase64); await new Promise(function(res){ setTimeout(res, 4000); }); }
  }
}

function showTab(tab) {
  document.getElementById("tab-emails").className = "tab-btn" + (tab === "emails" ? " active" : "");
  document.getElementById("tab-admin").className = "tab-btn" + (tab === "admin" ? " active" : "");
  document.getElementById("main").style.display = tab === "emails" ? "" : "none";
  document.getElementById("tab-admin-panel").style.display = tab === "admin" ? "" : "none";
  if (tab === "admin") loadAddresses();
}

async function loadAddresses() {
  document.getElementById("addr-list").innerHTML = '<div class="empty">Chargement…</div>';
  try {
    var r = await fetch("/api/addresses");
    var data = await r.json();
    var keys = Object.keys(data);
    if (!keys.length) {
      document.getElementById("addr-list").innerHTML = '<div class="empty">Aucune adresse mémorisée.</div>';
      return;
    }
    var html = '<div class="addr-row" style="border-bottom:1px solid #2a2a2a;margin-bottom:4px"><div class="addr-addr" style="color:#555">Adresse</div><div class="addr-sheet" style="color:#555">Onglet</div><div class="addr-date" style="color:#555">Mémorisé le</div><div style="width:80px"></div></div>';
    for (var k of keys) {
      var d = data[k];
      if (!d) continue;
      var date = d.savedAt ? new Date(d.savedAt).toLocaleDateString("fr-FR") : "—";
      html += '<div class="addr-row">'
        + '<div class="addr-addr">'+esc(d.address || k)+'</div>'
        + '<div class="addr-sheet">'+esc(d.sheetName || "—")+'</div>'
        + '<div class="addr-date">'+date+'</div>'
        + '<div style="display:flex;gap:6px">'
        + '<select id="edit-'+esc(k)+'" style="font-family:monospace;font-size:11px;background:#0f0f0f;color:#e8e8e0;border:1px solid #2a2a2a;border-radius:3px;padding:4px 6px">'
        + ALL_SHEETS.map(function(s){ return '<option value="'+esc(s)+'"'+(s===d.sheetName?' selected':'')+'>'+esc(s)+'</option>'; }).join("")
        + '</select>'
        + '<button class="btn" onclick="updateAddress(this,\'' + esc(k) + '\',\'' + esc(d.address || k) + '\')">✓</button>'
        + '<button class="btn" style="color:#ef4444;border-color:#ef444433" onclick="deleteAddress(\'' + esc(k) + '\',\'' + esc(d.address || k) + '\')">✕</button>'
        + '</div></div>';
    }
    document.getElementById("addr-list").innerHTML = html;
  } catch(e) {
    document.getElementById("addr-list").innerHTML = '<div class="empty">Erreur : '+esc(e.message)+'</div>';
  }
}

async function updateAddress(btn, key, address) {
  var sel = btn ? btn.previousElementSibling : document.getElementById("edit-"+key);
  if (!sel) return;
  var newSheet = sel.value;
  var clientName = (newSheet.match(/\[(.+?)\]/) || [])[1] || "Inconnu";
  await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "save", address: address, client: clientName, sheetName: newSheet })
  });
  loadAddresses();
}

async function deleteAddress(key, address) {
  if (!confirm("Supprimer cette adresse ?")) return;
  await fetch("/api/addresses", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: "delete", address: address })
  });
  loadAddresses();
}

async function refresh() {
  EMAILS = []; ORDERS = {};
  document.getElementById("main").innerHTML = '<div class="empty">Actualisation…</div>';
  try {
    LABEL_ID = LABEL_ID || await getOrCreateLabel(TRAITE_LABEL);
    EMAILS = await fetchUnreadEmails();
    renderEmailList();
  } catch(e) {
    document.getElementById("main").innerHTML = '<div class="empty">Erreur : '+e.message+'</div>';
  }
}
</script>
